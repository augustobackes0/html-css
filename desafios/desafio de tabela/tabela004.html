<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela004</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
            
        }

        th, td {
            border: 1px solid black;
            height: 40px;
        }

        thead {
            background-color: rgba(128, 128, 128, 0.671);
            color: white;
        }

        .cor {
            background-color: rgba(128, 128, 128, 0.671);
            color: white;
            padding-left: 15px;
            font-weight: bold;
            font-size: 1em;
        }

        #total {
            background-color: rgba(128, 128, 128, 0.671);
            color: white;
            text-align: center;
        }

        .diciplinas {
            padding-left: 10px;
        }

        .num {
            text-align: center;
        }

    </style>
</head>
<body>
    <table>
        <thead>
            
                <tr>
                    <th rowspan="2" scope="col">Áreas</th>
                    <th rowspan="2" scope="col">Diciplinas</th>
                    <th colspan="2" scope="colgroup">Notas</th>
                    <th rowspan="2" scope="col">Medias</th>
                </tr>
           <tr>
            <th scope="col">Nota 1</th>
            <th scope="col">Nota 2</th>
           </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas </th>
                <td class="diciplinas">Matematica</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td class="diciplinas">Fisica</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td class="diciplinas">Quimica</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td class="diciplinas">Biologia</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td colspan="4" class="cor">Media de Exatas</td>
                <td id="total">0.0</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td class="diciplinas">História</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td class="diciplinas">Geografia</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
                <td class="num">0.0</td>
            </tr>
            <tr>
                <td colspan="4" class="cor">Média de Humanas</td>
                <td id="total">0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
