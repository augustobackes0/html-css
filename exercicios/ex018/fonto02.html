<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontees externa</title>
    <style>
        @font-face {
            font-family: 'love';
            src: url('fonts/Filxgirl.ttf') format('Truetype'); 
            font-weight: normal;
            font-style: normal;

            /* 
            Tipos de format()
            -opentype (otf)
            -Truetype (ttf)
            -embedded-opentype
            -truetype-aat (apple advenced Typography)
            -svg
            */
        }
        @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            font-family: "Kaushan Script", cursive, sans-serif;
            font-weight: 900;
        }
        h1 {
            font-family: 'love', times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Commodi, recusandae reprehenderit. Laborum minima doloremque commodi, deserunt numquam voluptas facere? Necessitatibus dignissimos, nobis itaque debitis ratione libero labore magnam commodi consectetur.</p>
</body>
</html>
